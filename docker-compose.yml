version: "3.9"

services:
  db:
    image: postgres:16
    container_name: bookreview_db
    restart: always

    environment:
      POSTGRES_DB: bookreviewdb
      POSTGRES_USER: bookreviewuser
      POSTGRES_PASSWORD: bookreviewpassword

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5433:5432"

  web:
    build: .
    container_name: bookreview_backend

    command: >
      sh -c "
      python wait_for_db.py &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn --bind 0.0.0.0:8000 config.wsgi:application
      "

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    depends_on:
      - db

volumes:
  postgres_data: